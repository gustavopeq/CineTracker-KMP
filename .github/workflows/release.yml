name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    outputs:
      version-name: ${{ steps.version.outputs.version-name }}
      version-code: ${{ steps.version.outputs.version-code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version-name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version-code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Extracted: versionName=$TAG, versionCode=$VERSION_CODE"

      - name: Patch version in build.gradle.kts
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ steps.version.outputs.version-code }}/" composeApp/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ steps.version.outputs.version-name }}\"/" composeApp/build.gradle.kts

      - name: Create local.properties
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" >> local.properties
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> local.properties
          echo "SENTRY_ORG=${{ secrets.SENTRY_ORG }}" >> local.properties
          echo "SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}" >> local.properties
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore

      - name: Build signed AAB
        run: |
          ./gradlew --quiet :composeApp:bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "v${{ steps.version.outputs.version-name }}"
          files: composeApp/build/outputs/bundle/release/composeApp-release.aab
          generate_release_notes: true

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/release.keystore
